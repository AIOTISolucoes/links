<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOTI - Soluções Industriais</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#4ADE50;
  --green-bright:#00ff88;
  --green-dark:#2d8a31;
  --dark:#080c08;
  --card-border:rgba(74,222,80,0.12);
  --text-dim:rgba(255,255,255,0.45);
}

html,body{
  font-family:'Rajdhani',sans-serif;
  background:var(--dark);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* ====== BACKGROUND ====== */
.bg-grid{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.bg-grid::before{
  content:'';position:absolute;inset:-50%;
  background:
    linear-gradient(rgba(74,222,80,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(74,222,80,0.02) 1px,transparent 1px);
  background-size:50px 50px;
  animation:gridMove 25s linear infinite;
}
.bg-grid::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 40%,rgba(74,222,80,0.05) 0%,transparent 60%);
}
@keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(50px,50px)}}

.particle{
  position:fixed;width:2px;height:2px;background:var(--green);border-radius:50%;
  opacity:0;pointer-events:none;z-index:1;animation:floatP 10s infinite;
}
@keyframes floatP{0%{opacity:0;transform:translateY(100vh)}10%{opacity:0.35}90%{opacity:0.35}100%{opacity:0;transform:translateY(-10vh)}}

/* ====== INTRO ====== */
#intro{
  position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;background:var(--dark);
  z-index:2000;transition:opacity 1.2s ease;
}
#intro.fadeout{opacity:0;pointer-events:none}

#intro-logo{
  width:110px;height:110px;object-fit:contain;
  opacity:0;transform:scale(0.8);
  transition:opacity 1.5s ease,transform 1.5s ease;
}
#intro-logo.visible{opacity:1;transform:scale(1)}

#intro-text{
  margin-top:20px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:48px;
  letter-spacing:10px;
  color:#fff;
  min-height:60px;
}

#intro-text.glow{
  color:var(--green);
  text-shadow:0 0 10px var(--green),0 0 30px rgba(74,222,80,0.4);
  transition:color 0.8s ease,text-shadow 0.8s ease;
}

/* ====== SITE PRINCIPAL ====== */
#site{
  display:none;
  position:relative;
  z-index:10;
  min-height:100vh;
}

/* === LEFT SIDE — HIGHTECH SYMBOL === */
.side-left{
  position:fixed;
  left:20px;top:0;bottom:0;
  width:140px;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:5;
}

.hightech-symbol{
  width:120px;
  height:280px;
}

/* Draw animation */
.draw-line{
  fill:none;
  stroke:var(--green);
  stroke-width:1.2;
  opacity:0.3;
  stroke-dasharray:var(--len);
  stroke-dashoffset:var(--len);
  animation:drawIn var(--dur) var(--delay) ease forwards,pulseGlow 4s var(--pulse-delay) infinite;
}

@keyframes drawIn{to{stroke-dashoffset:0}}
@keyframes pulseGlow{0%,100%{opacity:0.3}50%{opacity:0.6}}

.travel-dot{fill:var(--green);opacity:0;animation:dotFadeIn 0.5s 4s forwards}
@keyframes dotFadeIn{to{opacity:0.7}}

/* === RIGHT SIDE — GEARS === */
.side-right{
  position:fixed;
  right:10px;top:0;bottom:0;
  width:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:5;
}

/* === CENTER CONTENT === */
.center-content{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px 60px;
  max-width:480px;
  margin:0 auto;
  text-align:center;
}

/* ====== PROFILE ====== */
.profile-section{
  margin-bottom:28px;
  opacity:0;animation:fadeUp 0.8s 0.2s forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.profile-pic{
  width:88px;height:88px;border-radius:50%;
  object-fit:contain;background:#111;
  border:2px solid rgba(74,222,80,0.25);
  box-shadow:0 0 25px rgba(74,222,80,0.1);
  margin-bottom:16px;padding:6px;
}

.profile-name{
  font-family:'Rajdhani',sans-serif;
  font-size:32px;font-weight:700;
  letter-spacing:4px;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:8px;
}

.verified-badge{width:22px;height:22px;flex-shrink:0;display:inline-flex}
.verified-badge svg{width:22px;height:22px}

.profile-subtitle{
  color:var(--text-dim);font-size:15px;margin-top:6px;
  letter-spacing:3px;text-transform:uppercase;font-weight:600;
}

/* ====== CARDS — SQUARE IMAGE BUTTONS ====== */
.cards-container{
  display:flex;flex-direction:column;gap:14px;
  margin-top:32px;width:100%;
}

.card-link{
  display:block;
  border-radius:14px;
  overflow:hidden;
  text-decoration:none;
  transition:all 0.35s ease;
  opacity:0;transform:translateY(15px);
  border:1px solid var(--card-border);
  background:rgba(74,222,80,0.03);
}

.card-link:hover{
  border-color:rgba(74,222,80,0.35);
  transform:translateY(-3px);
  box-shadow:0 10px 35px rgba(74,222,80,0.1);
}

.card-img-wrapper{
  width:100%;
  aspect-ratio:16/5;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.02);
}

.card-img-wrapper img{
  width:100%;height:100%;object-fit:cover;display:block;
}

.card-placeholder{
  display:flex;align-items:center;gap:14px;
  color:rgba(255,255,255,0.25);
  font-family:'Rajdhani',sans-serif;
  font-weight:700;font-size:16px;letter-spacing:2px;
  text-transform:uppercase;
}

.card-placeholder i{font-size:24px;color:var(--green);opacity:0.35}

/* ====== FOOTER ====== */
.footer{
  margin-top:40px;padding:20px 0;
  font-size:11px;color:rgba(255,255,255,0.1);letter-spacing:2px;
}

/* ====== RESPONSIVO ====== */
@media(max-width:1024px){
  .side-left{width:100px;left:10px}
  .hightech-symbol{width:80px;height:200px}
  .side-right{width:160px;right:5px}
  .side-right svg{width:160px;height:220px}
}

@media(max-width:768px){
  .side-left{width:60px;left:5px}
  .hightech-symbol{width:50px;height:160px;opacity:0.6}
  .side-right{width:90px;right:0}
  .side-right svg{width:90px;height:130px}
  .center-content{padding:30px 16px 50px}
  .profile-name{font-size:28px}
}

@media(max-width:480px){
  .side-left,.side-right{display:none}
  .center-content{padding:28px 16px 40px;max-width:100%}
  #intro-logo{width:80px;height:80px}
  #intro-text{font-size:34px;letter-spacing:6px}
  .profile-pic{width:74px;height:74px}
  .profile-name{font-size:24px;letter-spacing:2px}
  .profile-subtitle{font-size:13px;letter-spacing:2px}
  .cards-container{gap:12px}
  .card-placeholder{font-size:13px;gap:10px}
  .card-placeholder i{font-size:20px}
}
</style>
</head>

<script>
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDelay=Math.random()*10+'s';
    p.style.animationDuration=(8+Math.random()*6)+'s';
    c.appendChild(p);
  }
})();

const introLogo=document.getElementById('intro-logo');
const introText=document.getElementById('intro-text');
const introDiv=document.getElementById('intro');
const siteDiv=document.getElementById('site');

setTimeout(()=>introLogo.classList.add('visible'),300);

setTimeout(()=>{
  const text="AIOTI";let i=0;
  const timer=setInterval(()=>{
    introText.textContent+=text[i++];
    if(i>=text.length){
      clearInterval(timer);
      setTimeout(()=>{
        introText.classList.add('glow');
        setTimeout(()=>{
          introDiv.classList.add('fadeout');
          setTimeout(()=>{
            introDiv.style.display='none';
            siteDiv.style.display='block';
            document.querySelectorAll('.card-link').forEach((c,idx)=>{
              setTimeout(()=>{
                c.style.transition='opacity 0.6s ease,transform 0.6s ease';
                c.style.opacity='1';c.style.transform='translateY(0)';
              },idx*150);
            });
          },1200);
        },1000);
      },400);
    }
  },180);
